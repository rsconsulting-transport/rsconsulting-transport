<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RS Consulting Transport</title>
  <meta name="description" content="RS Consulting Transport – Fahrer Recruiting, Geschäftskontakte und praktische Lösungen für Transportunternehmen." />
  <style>
    :root{
      --bg:#f4f7fb;
      --white:#ffffff;
      --navy:#0b2342;
      --navy2:#133b69;
      --blue:#0f4c97;
      --blue2:#1f63ba;
      --light:#eef4fb;
      --text:#1f2937;
      --muted:#5d6776;
      --line:#d9e2ee;
      --shadow:0 14px 34px rgba(11,35,66,.10);
      --radius:24px;
      --max:1180px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}

    .container{
      width:min(var(--max), calc(100% - 28px));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(15,76,151,.08);
    }

    .nav{
      min-height:84px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:12px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      min-width:0;
    }

    .brand img{
      height:58px;
      width:auto;
      max-width:320px;
    }

    .brand-fallback{
      font-size:34px;
      font-weight:800;
      color:var(--blue);
      display:none;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:22px;
      flex-wrap:wrap;
    }

    .nav-links a{
      font-size:15px;
      font-weight:700;
      color:var(--muted);
    }
